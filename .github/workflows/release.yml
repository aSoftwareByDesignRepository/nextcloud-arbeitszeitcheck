name: Release ArbeitszeitCheck

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release archive
        run: make release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: arbeitszeitcheck-release
          path: build/release/arbeitszeitcheck.tar.gz

  sign-and-release:
    name: Sign and publish
    needs: build-release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: arbeitszeitcheck-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: arbeitszeitcheck.tar.gz
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Sign app for Nextcloud App Store (uncomment when cert is available)
